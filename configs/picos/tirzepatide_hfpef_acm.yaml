id: tirzepatide_hfpef_acm
title: Tirzepatide in HFpEF (all-cause mortality)
population: Adults with heart failure with preserved ejection fraction and obesity (BMI >= 30)
intervention: Tirzepatide
comparator: Placebo
outcome: All-cause mortality
outcome_type: binary
decision_threshold: 1.0
notes: |
  Reference trial: SUMMIT (Packer et al 2025, NEJM). HF-event benefit present
  but ACM HR reported non-significant (verify exact value against Packer 2025
  primary paper before release). Tension-bearing PICO; expected high flip
  probability because pipeline includes ongoing trials designed for ACM.
  NARRATIVE CENTERPIECE of the Nature Medicine paper.
