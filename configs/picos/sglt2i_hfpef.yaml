id: sglt2i_hfpef
title: SGLT2 inhibitors in HFpEF
population: Adults with heart failure with preserved ejection fraction (LVEF >= 50%)
intervention: SGLT2 inhibitor (empagliflozin or dapagliflozin)
comparator: Placebo or usual care
outcome: Composite of cardiovascular death or first heart failure hospitalisation
outcome_type: binary
decision_threshold: 1.0
notes: |
  Reference MA: Vaduganathan et al 2022 (Lancet). Mature, stable effect;
  expected low flip probability — Phase-1 sanity anchor.
